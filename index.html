<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andar Bahar Pro</title>
    <style>
        body { background-color: #0b1528; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .header { background: #112240; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; background: #1e3a8a; padding: 10px; border-radius: 8px; font-weight: bold; }
        .history-box { background: #1e293b; padding: 5px; font-size: 13px; color: #38bdf8; border-radius: 5px; margin: 5px 0; }
        .status-banner { font-size: 24px; font-weight: bold; color: #facc15; margin: 15px 0; }
        .confirm-msg { color: #10b981; font-weight: bold; font-size: 16px; margin: 5px; min-height: 20px; }
        .board { display: flex; gap: 10px; justify-content: center; }
        .zone { background: #1e293b; border: 2px solid #334155; border-radius: 12px; width: 48%; min-height: 160px; padding: 10px; }
        .zone.win { border-color: #10b981; background: #064e3b; }
        .card-display { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-top: 10px; }
        .bigCard { width: 85px; height: 120px; background: white; border-radius: 8px; color: black; display: flex; flex-direction: column; justify-content: space-between; padding: 5px; margin: 0 auto; font-weight: bold; }
        .card { width: 45px; height: 65px; background: white; border-radius: 4px; color: black; display: flex; flex-direction: column; justify-content: space-between; padding: 3px; font-size: 11px; font-weight: bold; }
        .red { color: #dc2626; } .black { color: #000000; }
        .controls { background: #112240; padding: 15px; border-radius: 12px; max-width: 500px; margin: 15px auto; }
        .btn-bet { padding: 10px 20px; font-size: 16px; font-weight: bold; border: 2px solid #2563eb; background: transparent; color: white; border-radius: 8px; cursor: pointer; margin: 5px; }
        .btn-bet.activeBtn { background: #2563eb; }
        .btn-action { background: #10b981; color: white; border: none; padding: 12px; width: 90%; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .deposit-section { margin-top: 15px; background: #1e293b; padding: 10px; border-radius: 8px; }
        .input-style { padding: 8px; border-radius: 5px; border: none; margin: 4px; width: 80%; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <div id="displayId" style="color:#f59e0b; font-weight:bold; margin-bottom:5px;">ID: Loading...</div>
        <div class="history-box">History Count: Andar (A): <span id="histA">0</span> | Bahar (B): <span id="histB">0</span></div>
        <div class="stats-grid">
            <div>Coins: <span id="coinsDisplay" style="color:#10b981;">50</span></div>
            <div>Your Bet: <span id="betDisplay" style="color:#facc15;">0</span></div>
            <div>Time: <span id="time" style="color:#ef4444;">15s</span></div>
        </div>
    </div>

    <div id="joker"></div>
    <div id="result" class="status-banner">Waiting...</div>
    <div id="confirmMsg" class="confirm-msg"></div>

    <div class="board">
        <div id="andarBox" class="zone"><div style="font-weight:bold;">ANDAR</div><div id="andar" class="card-display"></div></div>
        <div id="baharBox" class="zone"><div style="font-weight:bold;">BAHAR</div><div id="bahar" class="card-display"></div></div>
    </div>

    <div class="controls">
        <button id="andarBtn" class="btn-bet activeBtn" onclick="selectSide('andar')">ANDAR</button>
        <button id="baharBtn" class="btn-bet" onclick="selectSide('bahar')">BAHAR</button>
        <br>
        <input type="number" id="amount" class="input-style" value="10" style="width:100px;">
        <br><br>
        <button id="placeBtn" class="btn-action" onclick="placeBet()">PLACE BET</button>
        
        <div class="deposit-section">
            <h4>Coin Deposit Request</h4>
            <input type="number" id="depAmt" class="input-style" placeholder="Enter Amount">
            <input type="text" id="depUtr" class="input-style" placeholder="Enter Transaction UTR/ID">
            <button onclick="sendDeposit()" style="background:#3b82f6; color:white; border:none; padding:8px; border-radius:5px; width:84%; margin-top:5px; font-weight:bold;">Send Request</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPRAHTuiVTxDwng6KzCTDZ3-70P2YSN98",
            authDomain: "my-first-app-cad29.firebaseapp.com",
            databaseURL: "https://my-first-app-cad29-default-rtdb.firebaseio.com",
            projectId: "my-first-app-cad29",
            storageBucket: "my-first-app-cad29.appspot.com",
            messagingSenderId: "899016030652",
            appId: "1:899016030652:web:b7d3c0b1294b2db6f453b9"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        let myId = localStorage.getItem('player_id') || 'User-' + Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem('player_id', myId);
        let myCoins = 50; 
        let selectedSide = 'andar';
        let betPlacedThisRound = false;

        document.getElementById('displayId').innerText = "Account ID: " + myId;

        // Player ID database me 50 coins ke sath insert/sync karna
        onValue(ref(database, 'players/' + myId), (snapshot) => {
            if (snapshot.exists()) {
                myCoins = snapshot.val().coins;
                document.getElementById('coinsDisplay').innerText = myCoins;
            } else {
                set(ref(database, 'players/' + myId), { coins: 50 });
            }
        });

        onValue(ref(database, 'game'), (snapshot) => {
            const game = snapshot.val();
            if (!game) return;

            if(document.getElementById('time')) document.getElementById('time').innerText = (game.time || 0) + "s";
            if(game.stats) {
                document.getElementById('histA').innerText = game.stats.A || 0;
                document.getElementById('histB').innerText = game.stats.B || 0;
            }
            if(game.joker) { buildJokerCard(game.joker); } else { document.getElementById('joker').innerHTML = ''; }

            if (game.status === 'betting') {
                betPlacedThisRound = false;
                document.getElementById('placeBtn').disabled = false;
                document.getElementById('result').innerText = 'Betting Open...';
                document.getElementById('andar').innerHTML = '';
                document.getElementById('bahar').innerHTML = '';
                document.getElementById('andarBox').classList.remove('win');
                document.getElementById('baharBox').classList.remove('win');
            } 
            else if (game.status === 'dealing') {
                document.getElementById('placeBtn').disabled = true;
                document.getElementById('result').innerText = 'Dealing Cards...';
                document.getElementById('confirmMsg').innerText = '';
                renderCurrentCards(game.andarCards, game.baharCards);
            } 
            else if (game.status === 'finished') {
                document.getElementById('placeBtn').disabled = true;
                document.getElementById('result').innerText = `${game.winner.toUpperCase()} WINS!`;
                document.getElementById('confirmMsg').innerText = '';
                document.getElementById('andarBox').classList.toggle('win', game.winner === 'andar');
                document.getElementById('baharBox').classList.toggle('win', game.winner === 'bahar');
                document.getElementById('betDisplay').innerText = '0';
            }
        });

        function buildJokerCard(joker) {
            let color = (joker.suit === '♥' || joker.suit === '♦') ? 'red' : 'black';
            document.getElementById('joker').innerHTML = `<div class="bigCard"><div class="${color}">${joker.rank}${joker.suit}</div><div style="font-size:35px; align-self:center; color:${color}">${joker.suit}</div><div class="${color}" style="text-align:right">${joker.rank}${joker.suit}</div></div>`;
        }

        function renderCurrentCards(andar, bahar) {
            if(andar) {
                document.getElementById('andar').innerHTML = Object.values(andar).map(c => {
                    let color = (c.suit === '♥' || c.suit === '♦') ? 'red' : 'black';
                    return `<div class="card"><span class="${color}">${c.rank}${c.suit}</span><span class="${color}" style="font-size:14px; text-align:center">${c.suit}</span></div>`;
                }).join('');
            }
            if(bahar) {
                document.getElementById('bahar').innerHTML = Object.values(bahar).map(c => {
                    let color = (c.suit === '♥' || c.suit === '♦') ? 'red' : 'black';
                    return `<div class="card"><span class="${color}">${c.rank}${c.suit}</span><span class="${color}" style="font-size:14px; text-align:center">${c.suit}</span></div>`;
                }).join('');
            }
        }

        window.selectSide = function(side) {
            selectedSide = side;
            document.getElementById('andarBtn').className = (side === 'andar' ? 'btn-bet activeBtn' : 'btn-bet');
            document.getElementById('baharBtn').className = (side === 'bahar' ? 'btn-bet activeBtn' : 'btn-bet');
        }

        window.placeBet = function() {
            if(betPlacedThisRound) return alert("Bet already placed!");
            let amt = parseInt(document.getElementById('amount').value);
            if (amt <= 0 || isNaN(amt) || amt > myCoins) return alert("Invalid amount or Low balance!");

            betPlacedThisRound = true;
            document.getElementById('betDisplay').innerText = amt;
            document.getElementById('confirmMsg').innerText = `${amt} Coins Bet Placed on ${selectedSide.toUpperCase()}`;

            update(ref(database, 'players/' + myId), {
                coins: myCoins - amt,
                currentBet: { side: selectedSide, amount: amt }
            });
        }

        window.sendDeposit = function() {
            let amt = document.getElementById('depAmt').value;
            let utr = document.getElementById('depUtr').value;
            if(!amt || utr.length < 4) return alert("Fill deposit details properly!");
            push(ref(database, 'depositRequests'), { userId: myId, amount: parseInt(amt), utr: utr, timestamp: Date.now() });
            alert("Deposit Request Sent to Admin!");
            document.getElementById('depAmt').value = ''; document.getElementById('depUtr').value = '';
        }
    </script>
</body>
</html>
