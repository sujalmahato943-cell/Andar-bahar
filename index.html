<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Andar Bahar Casino Club</title>
    <style>
        body { background-color: #0b132b; color: white; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; -webkit-user-select: none; user-select: none; touch-action: manipulation; }
        .container { max-width: 480px; margin: 0 auto; background: #1c2541; padding: 15px; border-radius: 20px; box-shadow: 0px 10px 30px rgba(0,0,0,0.7); border: 1px solid #3a506b; }
        .header-box { background: #222e50; padding: 12px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #3a506b; }
        .accent-text { color: #ffbc00; font-weight: bold; }
        .coins-text { color: #00f5d4; font-weight: bold; }
        .time-text { color: #ff5c5c; font-weight: bold; font-size: 18px; }
        .joker-area { margin: 15px 0; min-height: 170px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px; }
        .card { display: inline-block; width: 85px; height: 125px; background: #ffffff; color: #000000; border-radius: 10px; padding: 8px; box-sizing: border-box; position: relative; font-weight: bold; font-size: 20px; box-shadow: 0 6px 12px rgba(0,0,0,0.4); margin: 5px; vertical-align: top; }
        .card.red { color: #e63946; }
        .card.black { color: #1d3557; }
        .card .suit-center { font-size: 34px; position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); }
        .board { display: flex; justify-content: space-between; margin: 15px 0; }
        .side-box { width: 48%; background: #0b132b; padding: 10px; border-radius: 12px; min-height: 180px; border: 1px solid #3a506b; box-sizing: border-box; transition: all 0.4s ease-in-out; }
        .side-box.winner-glow { border-color: #10b981 !important; background: #064e3b !important; box-shadow: 0 0 20px #10b981; }
        .card-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-top: 10px; }
        .btn-bet { background: #1e293b; color: white; border: 2px solid #3a506b; padding: 12px; font-size: 15px; font-weight: bold; border-radius: 10px; cursor: pointer; margin: 5px; width: 44%; transition: background 0.2s; }
        .btn-bet.activeBtn { background: #00b4d8; border-color: #00f5d4; box-shadow: 0 0 15px #00b4d8; }
        .input-amt { width: 60%; padding: 10px; font-size: 16px; border-radius: 8px; border: 2px solid #3a506b; background: #0b132b; color: white; text-align: center; margin-top: 10px; }
        .btn-submit { width: 92%; background: #ffb703; color: #023047; border: none; padding: 12px; font-weight: bold; font-size: 16px; border-radius: 10px; cursor: pointer; margin-top: 12px; }
        .history-box { background: #0b132b; padding: 8px; border-radius: 8px; margin-top: 5px; display: flex; justify-content: center; align-items: center; gap: 6px; min-height: 35px; flex-wrap: wrap; }
        .history-item { padding: 3px 8px; border-radius: 5px; font-weight: bold; font-size: 13px; color: white; }
        .blue-badge { background: #2563eb; }
        .gold-badge { background: #d97706; }
        .upi-box { background: #111c3a; padding: 12px; border-radius: 12px; margin-top: 20px; border: 1px dashed #3a506b; text-align: left; }
        .tab-btn { background: #1e293b; color: #cbd5e1; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .tab-btn.active-tab { background: #3b82f6; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <div>Your ID: <span class="accent-text" id="displayPlayerId">Generating...</span></div>
        <div style="font-size: 13px; margin-top: 5px; color:#a5b4fc;">
            Recent Winners: 
            <div id="historyContainer" class="history-box">Connecting Engine...</div>
        </div>
        <hr style="border:0; border-top:1px solid #3a506b; margin:10px 0;">
        <div style="display: flex; justify-content: space-around; font-size: 14px;">
            <div>Coins: <span class="coins-text" id="topCoins">--</span></div>
            <div>Your Bet: <span class="accent-text" id="betDisplay">0</span></div>
            <div>Timer: <span class="time-text" id="timer">--</span></div>
        </div>
    </div>

    <div id="confirmMsg" style="color: #00f5d4; font-weight: bold; margin-bottom: 8px; min-height: 22px; font-size:14px; background: rgba(0,245,212,0.1); border-radius: 5px; display: flex; justify-content: center; align-items: center;"></div>

    <div class="joker-area">
        <h4 style="margin:0 0 5px 0; color:#cbd5e1; font-size:13px; letter-spacing:1px;">JOKER CARD</h4>
        <div id="jokerPlaceholder"><div class="card black" style="opacity:0.2;"><span>?</span><div class="suit-center">?</div></div></div>
        <h3 id="gameStatus" style="color: #ffbc00; margin: 8px 0; font-size:18px;">Connecting Server...</h3>
    </div>

    <div class="board">
        <div class="side-box" id="andarBox">
            <h4 style="margin:0; color:#3b82f6; font-size:15px;">ANDAR</h4>
            <div class="card-container" id="andarCards"></div>
        </div>
        <div class="side-box" id="baharBox">
            <h4 style="margin:0; color:#eab308; font-size:15px;">BAHAR</h4>
            <div class="card-container" id="baharCards"></div>
        </div>
    </div>

    <div>
        <button id="andarBtn" class="btn-bet activeBtn" onclick="selectSide('andar')">ANDAR</button>
        <button id="baharBtn" class="btn-bet" onclick="selectSide('bahar')">BAHAR</button>
        <br>
        <input type="number" id="amount" class="input-amt" value="20" min="1" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        <br>
        <button class="btn-submit" id="mainSubmitBtn" onclick="placeBet()">PLACE BET</button>
    </div>

    <div class="upi-box">
        <div style="display: flex; justify-content: space-around; margin-bottom: 12px; border-bottom: 1px solid #3a506b; padding-bottom: 8px;">
            <button onclick="toggleFinanceTab('deposit')" id="depTabBtn" class="tab-btn active-tab">📥 Deposit</button>
            <button onclick="toggleFinanceTab('withdraw')" id="witTabBtn" class="tab-btn">📤 Withdraw</button>
        </div>

        <div id="depositTabSection">
            <div style="text-align: center; margin-bottom: 8px;">
                <span>UPI ID: <strong style="color:#00f5d4;" id="liveUpiDisplay">Loading...</strong></span>
            </div>
            <input type="number" id="depAmt" placeholder="Coins Amount" style="width:94%; padding:7px; margin:4px 0; background:#0b132b; color:white; border:1px solid #3a506b; border-radius:5px;">
            <input type="text" id="depUtr" placeholder="12-Digit UTR / Ref No" style="width:94%; padding:7px; margin:4px 0; background:#0b132b; color:white; border:1px solid #3a506b; border-radius:5px;">
            <button onclick="sendDeposit()" style="width:100%; background:#22c55e; color:white; border:none; padding:9px; font-weight:bold; border-radius:5px; cursor:pointer; margin-top:5px;">SUBMIT DEPOSIT REQUEST</button>
        </div>

        <div id="withdrawTabSection" style="display: none;">
            <input type="number" id="witAmt" placeholder="Withdraw Coins" style="width:94%; padding:7px; margin:4px 0; background:#0b132b; color:white; border:1px solid #3a506b; border-radius:5px;">
            <input type="text" id="witUpi" placeholder="Enter Your UPI ID" style="width:94%; padding:7px; margin:4px 0; background:#0b132b; color:white; border:1px solid #3a506b; border-radius:5px;">
            <button onclick="sendWithdrawal()" style="width:100%; background:#ef4444; color:white; border:none; padding:9px; font-weight:bold; border-radius:5px; cursor:pointer; margin-top:5px;">REQUEST WITHDRAWAL</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getDatabase, ref, set, update, onValue, push, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://my-first-app-cad29-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    const dom = {
        playerId: document.getElementById("displayPlayerId"),
        liveUpi: document.getElementById('liveUpiDisplay'),
        topCoins: document.getElementById('topCoins'),
        betDisplay: document.getElementById('betDisplay'),
        confirmMsg: document.getElementById('confirmMsg'),
        timer: document.getElementById('timer'),
        gameStatus: document.getElementById('gameStatus'),
        jokerArea: document.getElementById('jokerPlaceholder'),
        andarCards: document.getElementById('andarCards'),
        baharCards: document.getElementById('baharCards'),
        andarBox: document.getElementById('andarBox'),
        baharBox: document.getElementById('baharBox'),
        andarBtn: document.getElementById('andarBtn'),
        baharBtn: document.getElementById('baharBtn'),
        submitBtn: document.getElementById('mainSubmitBtn'),
        history: document.getElementById('historyContainer')
    };

    let myId = localStorage.getItem('casino_player_id') || `PLAYER-${Math.floor(10000 + Math.random() * 90000)}`;
    localStorage.setItem('casino_player_id', myId);
    dom.playerId.innerText = myId;

    let myCoins = 0, selectedSide = "andar", isBettingOpen = false, existingBetSide = null;

    onValue(ref(database, 'system/config'), snap => {
        if(snap.exists()) dom.liveUpi.innerText = snap.val().upi || "admin@upi";
    });

    onValue(ref(database, `players/${myId}`), snapshot => {
        if(!snapshot.exists()) {
            set(ref(database, `players/${myId}`), { coins: 1000, currentBet: null });
            return;
        }
        const pData = snapshot.val();
        myCoins = parseInt(pData.coins) || 0;
        dom.topCoins.innerText = myCoins;
        
        if(pData.currentBet) {
            existingBetSide = pData.currentBet.side;
            let amt = parseInt(pData.currentBet.amount) || 0;
            dom.betDisplay.innerText = `${amt} (${existingBetSide.toUpperCase()})`;
            dom.confirmMsg.innerText = `Total Bet Active: ${amt} Coins on ${existingBetSide.toUpperCase()}`;
            window.selectSide(existingBetSide);
        } else {
            dom.betDisplay.innerText = "0";
            dom.confirmMsg.innerText = "";
            existingBetSide = null;
        }
    });

    // Client Side Synchronized Engine System
    onValue(ref(database, 'game'), snapshot => {
        if(!snapshot.exists()) return;
        const gameData = snapshot.val();
        
        isBettingOpen = gameData.status === "betting";
        dom.submitBtn.style.opacity = isBettingOpen ? "1" : "0.5";
        dom.timer.innerText = isBettingOpen ? `${gameData.time}s` : "Closed";

        if(isBettingOpen) {
            dom.gameStatus.innerText = "Place Your Bets Now!";
            dom.andarCards.innerHTML = '';
            dom.baharCards.innerHTML = '';
            dom.andarBox.classList.remove('winner-glow');
            dom.baharBox.classList.remove('winner-glow');
        }

        if(gameData.joker) {
            let j = gameData.joker;
            let clr = (j.suit === '♦' || j.suit === '♥') ? 'red' : 'black';
            dom.jokerArea.innerHTML = `<div class="card ${clr}"><span>${j.rank}${j.suit}</span><div class="suit-center">${j.suit}</div></div>`;
        }

        if(gameData.status === "dealing") dom.gameStatus.innerText = "Dealing Cards...";

        renderCardStack(dom.andarCards, gameData.andarCards);
        renderCardStack(dom.baharCards, gameData.baharCards);

        if(gameData.status === "ended" && gameData.winner) {
            dom.gameStatus.innerText = `${gameData.winner.toUpperCase()} WINS! 🎉`;
            dom[`${gameData.winner}Box`].classList.add('winner-glow');
        }

        if(gameData.historyList) {
            dom.history.innerHTML = Object.values(gameData.historyList).map(win => {
                return `<div class="history-item ${win === 'andar' ? 'blue-badge' : 'gold-badge'}">${win[0].toUpperCase()}</div>`;
            }).join('');
        }
    });

    function renderCardStack(element, cardArray) {
        if(!cardArray) { element.innerHTML = ""; return; }
        element.innerHTML = Object.values(cardArray).map(card => {
            let clr = (card.suit === '♦' || card.suit === '♥') ? 'red' : 'black';
            return `<div class="card ${clr}"><span>${card.rank}${card.suit}</span><div class="suit-center" style="font-size:14px;">${card.suit}</div></div>`;
        }).join('');
    }

    window.selectSide = function(side) {
        if(existingBetSide && existingBetSide !== side) {
            alert(`Aapne pehle se ${existingBetSide.toUpperCase()} par bet lock ki hui h!`);
            return; 
        }
        selectedSide = side;
        dom.andarBtn.className = (side === 'andar' ? 'btn-bet activeBtn' : 'btn-bet');
        dom.baharBtn.className = (side === 'bahar' ? 'btn-bet activeBtn' : 'btn-bet');
    }

    window.placeBet = function() {
        if(!isBettingOpen) return alert("Betting abhi locked hai!");
        let newAmtInput = parseInt(document.getElementById('amount').value);
        if (newAmtInput <= 0 || isNaN(newAmtInput)) return alert("Sahi amount enter karein!");
        if (newAmtInput > myCoins) return alert("Insufficient Balance!");

        runTransaction(ref(database, `players/${myId}`), (currentData) => {
            if (currentData) {
                let currentCoins = parseInt(currentData.coins) || 0;
                if (newAmtInput > currentCoins) return; 
                let activeBetAmt = (currentData.currentBet && currentData.currentBet.side === selectedSide) ? parseInt(currentData.currentBet.amount) || 0 : 0;
                currentData.coins = currentCoins - newAmtInput;
                currentData.currentBet = { side: selectedSide, amount: activeBetAmt + newAmtInput };
            }
            return currentData;
        }).catch(() => alert("Network Busy, try again."));
    }

    window.toggleFinanceTab = function(tabName) {
        const isDep = tabName === 'deposit';
        document.getElementById('depositTabSection').style.display = isDep ? 'block' : 'none';
        document.getElementById('withdrawTabSection').style.display = isDep ? 'none' : 'block';
        document.getElementById('depTabBtn').className = isDep ? 'tab-btn active-tab' : 'tab-btn';
        document.getElementById('witTabBtn').className = isDep ? 'tab-btn' : 'tab-btn active-tab';
    }

    window.sendDeposit = function() {
        let amt = document.getElementById('depAmt').value; 
        let utr = document.getElementById('depUtr').value.trim();
        if(!amt || utr.length < 6) return alert("Details incomplete hain!");
        push(ref(database, 'requests/deposits'), { userId: myId, amount: parseInt(amt), utr: utr, timestamp: Date.now() });
        alert("Request sent successfully!");
        document.getElementById('depAmt').value = ''; document.getElementById('depUtr').value = '';
    }

    window.sendWithdrawal = function() {
        let amt = parseInt(document.getElementById('witAmt').value); 
        let upi = document.getElementById('witUpi').value.trim();
        if(isNaN(amt) || amt < 100) return alert("Minimum withdrawal 100 coins hai!");
        if(amt > myCoins) return alert("Insufficient Balance!");
        if(!upi) return alert("UPI ID enter kijiye!");
        
        runTransaction(ref(database, `players/${myId}`), (profile) => {
            if(profile && profile.coins >= amt) {
                profile.coins -= amt;
                return profile;
            }
            return;
        }).then((result) => {
            if(result.committed) {
                push(ref(database, 'requests/withdraws'), { userId: myId, amount: amt, upiId: upi, timestamp: Date.now() });
                alert("Withdrawal request successfully filed!");
                document.getElementById('witAmt').value = ''; document.getElementById('witUpi').value = '';
            } else {
                alert("Transaction failed!");
            }
        }).catch(() => alert("Error running transaction."));
    }
</script>
</body>
</html>
