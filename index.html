<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andar Bahar Pro - Master Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0f172a; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        .container { max-width: 600px; margin: auto; }
        .card { width: 50px; height: 75px; background: #fff; border-radius: 6px; margin: 4px; display: inline-flex; flex-direction: column; justify-content: space-between; padding: 5px; font-weight: bold; animation: pop 0.3s ease; box-shadow: 0 2px 5px rgba(0,0,0,0.3); color: #000; font-size: 14px; }
        @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .bigCard { width: 100px; height: 140px; background: #fff; border-radius: 12px; margin: 15px auto; display: flex; flex-direction: column; justify-content: space-between; padding: 10px; font-weight: bold; font-size: 24px; color: #000; border: 4px solid #3b82f6; animation: pop 0.5s ease; }
        .red { color: #ef4444; } .black { color: #1e293b; }
        .row { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
        .box { flex: 1; background: #1e293b; padding: 15px; border-radius: 12px; min-height: 180px; border: 2px solid transparent; transition: 0.3s; }
        .win { border: 3px solid #22c55e !important; background: #064e3b !important; }
        button { padding: 10px 15px; margin: 5px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-bet { background: #3b82f6; color: white; width: 45%; border: 2px solid transparent; }
        .activeBtn { border-color: #fff; background: #22c55e !important; }
        .btn-place { background: #22c55e; color: white; width: 90%; font-size: 18px; margin-top: 10px; }
        input { padding: 10px; border-radius: 8px; border: none; text-align: center; background: #f1f5f9; color: #000; }
        .panel { background: #1e293b; padding: 15px; border-radius: 12px; margin-top: 15px; }
        .status-bar { background: #1e293b; padding: 10px; border-radius: 8px; display: flex; justify-content: space-around; }
        #adminOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #020617; z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .ctrl-active { border: 2px solid #fbbf24; box-shadow: 0 0 10px #fbbf24; }
    </style>
</head>
<body>

<div class="container">
    <h2>🃏 Andar Bahar Pro</h2>
    <p style="font-size:12px; color:#94a3b8">Your ID: <b id="displayId">...</b></p>

    <div class="status-bar">
        <span>Coins: <b id="coins" style="color:#22c55e">0</b></span>
        <span>Time: <b id="time" style="color:#ef4444">0</b>s</span>
    </div>

    <div id="joker"></div>
    <div id="result" style="font-size:22px; font-weight:bold; height:30px; margin:10px; color:#fbbf24;">Syncing Game...</div>

    <div class="row">
        <div class="box" id="andarBox"><h3>ANDAR</h3><div id="andar"></div></div>
        <div class="box" id="baharBox"><h3>BAHAR</h3><div id="bahar"></div></div>
    </div>

    <div class="panel">
        <div class="row" style="margin:0 0 10px 0;">
            <button id="andarBtn" class="btn-bet" onclick="selectSide('andar')">ANDAR</button>
            <button id="baharBtn" class="btn-bet" onclick="selectSide('bahar')">BAHAR</button>
        </div>
        <input id="amount" type="number" value="100" style="width:80px;">
        <button class="btn-place" id="placeBtn" onclick="placeBet()">PLACE BET</button>
        <div id="betMsg" style="margin-top:10px; font-weight:bold;"></div>
    </div>
</div>

<div id="adminOverlay">
    <button onclick="document.getElementById('adminOverlay').style.display='none'" style="background:#ef4444; color:white; float:right;">Exit</button>
    <h2>🛠 Master Control</h2>
    
    <div class="panel" style="border:2px solid #fbbf24;">
        <h4>🎯 Control Winner</h4>
        <button id="ctrlAndar" onclick="setWinner('andar')">ANDAR WIN</button>
        <button id="ctrlBahar" onclick="setWinner('bahar')">BAHAR WIN</button>
        <button id="ctrlAuto" class="ctrl-active" onclick="setWinner('auto')">AUTO</button>
    </div>

    <div class="panel">
        <h4>💰 Edit User Coins</h4>
        <input type="text" id="adminTargetId" placeholder="User-ID (e.g. User-1234)"><br><br>
        <input type="number" id="adminCoinAmt" placeholder="Amount">
        <div class="row">
            <button onclick="adminCoinAction('add')" style="background:#22c55e; flex:1;">+ Add</button>
            <button onclick="adminCoinAction('sub')" style="background:#ef4444; flex:1;">- Minus</button>
        </div>
    </div>
</div>

<script>
    // 1. APNA FIREBASE CONFIG YAHAN PASTE KAREIN
    const firebaseConfig = {
        apiKey: "AIzaSyAPRAHTuiVTxDWng6Kz...",
        authDomain: "my-first-app-cad29.firebaseapp.com",
        databaseURL: "https://my-first-app-cad29-default-rtdb.firebaseio.com",
        projectId: "my-first-app-cad29",
        storageBucket: "my-first-app-cad29.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ID Setup & Notification
    let myId = localStorage.getItem('player_id');
    if (!myId) {
        myId = 'User-' + Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem('player_id', myId);
        db.ref('players/' + myId).set({ coins: 500, lastSeen: Date.now() });
        db.ref('notifications/').push({ msg: "New Player Joined: " + myId, time: Date.now() });
    }
    document.getElementById('displayId').innerText = myId;

    // Check Admin
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.get('admin') === 'true') {
        document.getElementById('adminOverlay').style.display = 'block';
    }

    // Sync Game State
    db.ref('game_state').on('value', (snap) => {
        const state = snap.val();
        if(!state) return;
        document.getElementById('time').innerText = state.timer;
        document.getElementById('result').innerText = state.status;
        
        if(state.timer === 0) {
            showResultCards(state.winner, state.joker);
        } else {
            resetTable(state.joker);
        }
    });

    // Sync Coins
    db.ref('players/' + myId + '/coins').on('value', (snap) => {
        document.getElementById('coins').innerText = snap.val() || 0;
    });

    let selectedSide = 'andar';
    function selectSide(side) {
        selectedSide = side;
        document.getElementById('andarBtn').classList.toggle('activeBtn', side === 'andar');
        document.getElementById('baharBtn').classList.toggle('activeBtn', side === 'bahar');
    }

    function placeBet() {
        let amt = parseInt(document.getElementById('amount').value);
        let currentCoins = parseInt(document.getElementById('coins').innerText);
        if(amt > currentCoins) return alert("Low Balance!");
        
        db.ref('live_bets/' + myId).set({ side: selectedSide, amount: amt });
        db.ref('players/' + myId + '/coins').set(currentCoins - amt);
        document.getElementById('betMsg').innerText = "Bet Placed: " + amt;
    }

    // Admin Functions
    function setWinner(side) {
        db.ref('game_state/forced').set(side);
        alert("Next winner set to: " + side);
    }

    function adminCoinAction(type) {
        let tid = document.getElementById('adminTargetId').value;
        let amt = parseInt(document.getElementById('adminCoinAmt').value);
        if(!tid || !amt) return alert("Details bhariye!");
        
        db.ref('players/' + tid + '/coins').transaction((current) => {
            return (type === 'add') ? (current || 0) + amt : (current || 0) - amt;
        });
        alert("Success!");
    }

    function resetTable(jokerCard) {
        document.getElementById('andar').innerHTML = '';
        document.getElementById('bahar').innerHTML = '';
        document.getElementById('andarBox').classList.remove('win');
        document.getElementById('baharBox').classList.remove('win');
        if(jokerCard) {
            document.getElementById('joker').innerHTML = `<div class="bigCard"><div>${jokerCard}</div></div>`;
        }
    }

    function showResultCards(winner, joker) {
        document.getElementById(winner + 'Box').classList.add('win');
        document.getElementById('result').innerText = winner.toUpperCase() + " WINS!";
    }

    // AUTO GAME LOGIC (Admin browser handle karega timer)
    if(urlParams.get('admin') === 'true') {
        let t = 15;
        setInterval(() => {
            t--;
            if(t < 0) {
                t = 15;
                db.ref('game_state/forced').get().then(s => {
                    let win = s.val() === 'auto' ? (Math.random() > 0.5 ? 'andar' : 'bahar') : s.val();
                    db.ref('game_state').update({ timer: t, winner: win, status: "Winner: " + win, joker: "K♥" });
                    db.ref('game_state/forced').set('auto');
                });
            } else {
                db.ref('game_state/timer').set(t);
                db.ref('game_state/status').set("Betting Open...");
            }
        }, 1000);
    }
</script>
</body>
</html>
