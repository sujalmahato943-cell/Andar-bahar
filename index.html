<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andar Bahar Pro - Master Control</title>
    <!-- Firebase Realtime Core Database SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #0f172a; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        .container { max-width: 600px; margin: auto; }
        
        /* Card Styling */
        .card {
            width: 50px; height: 75px; background: #fff; border-radius: 6px;
            margin: 4px; display: inline-flex; flex-direction: column;
            justify-content: space-between; padding: 5px; font-weight: bold;
            animation: pop 0.3s ease; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            color: #000; font-size: 14px;
        }
        @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .bigCard {
            width: 100px; height: 140px; background: #fff; border-radius: 12px;
            margin: 15px auto; display: flex; flex-direction: column;
            justify-content: space-between; padding: 10px; font-weight: bold;
            font-size: 24px; color: #000; border: 4px solid #3b82f6;
            animation: pop 0.5s ease;
        }

        .red { color: #ef4444; }
        .black { color: #1e293b; }

        .row { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
        .box { flex: 1; background: #1e293b; padding: 15px; border-radius: 12px; min-height: 180px; border: 2px solid transparent; transition: 0.3s; }
        .win { border: 3px solid #22c55e !important; background: #064e3b !important; transform: scale(1.02); }

        button { padding: 10px 15px; margin: 5px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-bet { background: #3b82f6; color: white; width: 45%; border: 2px solid transparent; }
        .activeBtn { border-color: #fff; background: #22c55e !important; transform: scale(1.05); box-shadow: 0 0 10px #22c55e; }
        .btn-place { background: #22c55e; color: white; width: 90%; font-size: 18px; margin-top: 10px; }
        .btn-place:disabled { background: #475569; cursor: not-allowed; opacity: 0.5; }
        input { padding: 10px; border-radius: 8px; border: none; text-align: center; font-size: 16px; background: #f1f5f9; color: #000; }

        .panel { background: #1e293b; padding: 15px; border-radius: 12px; margin-top: 15px; border: 1px solid #334155; }
        .status-bar { background: #1e293b; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-around; align-items: center; }
        
        #history span { display: inline-block; width: 25px; height: 25px; line-height: 25px; margin: 3px; border-radius: 50%; font-weight: bold; font-size: 12px; }
        .a-hist { background: #22c55e; color: #000; }
        .b-hist { background: #3b82f6; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h2>🃏 Andar Bahar Pro</h2>
    <div style="font-size: 12px; color: #94a3b8; margin-bottom: 5px;">My Account ID: <span id="myIdDisplay" style="color:#fbbf24; font-weight:bold;">Loading ID...</span></div>

    <div class="status-bar">
        <span>Coins: <b id="coins" style="color:#22c55e">0</b></span>
        <span>Total Bet: <b id="totalBetDisplay" style="color:#fbbf24">0</b></span>
        <span>Time: <b id="time" style="color:#ef4444">10</b>s</span>
    </div>

    <div id="joker"></div>
    <div id="result" style="font-size:22px; font-weight:bold; height:30px; margin:10px; color:#fbbf24;">Waiting...</div>

    <div class="row">
        <div class="box" id="andarBox">
            <h3>ANDAR</h3>
            <div id="andar"></div>
        </div>
        <div class="box" id="baharBox">
            <h3>BAHAR</h3>
            <div id="bahar"></div>
        </div>
    </div>

    <!-- Bet UI Panel -->
    <div class="panel">
        <div class="row" style="margin:0 0 10px 0;">
            <button id="andarBtn" class="btn-bet" onclick="selectSide('andar')">ANDAR</button>
            <button id="baharBtn" class="btn-bet" onclick="selectSide('bahar')">BAHAR</button>
        </div>
        <input id="amount" type="number" value="100" style="width:80px;">
        <button onclick="quick(100)">+100</button>
        <button onclick="doubleBet()">2x</button>
        <button class="btn-place" id="placeBtn" onclick="placeBet()">PLACE BET</button>
        <div id="betMsg" style="margin-top:10px; font-size:14px; min-height:20px; font-weight:bold; color:#94a3b8"></div>
    </div>

    <!-- Wallet Section -->
    <div class="row">
        <div class="panel" style="flex:1; border-color: #22c55e; border-style: dashed;">
            <h4 style="margin:0 0 5px 0;">💰 Deposit</h4>
            <div id="displayUPI" style="font-size:10px; color:#fbbf24; margin-bottom:5px;">UPI: loading...</div>
            <input type="number" id="userDepAmt" placeholder="Amt" style="width:90%; margin-bottom:5px; font-size:11px;">
            <input type="text" id="userUTR" placeholder="UTR Num" style="width:90%; margin-bottom:5px; font-size:11px;">
            <button onclick="requestDeposit()" style="background:#22c55e; color:white; width:95%; padding: 5px; font-size:11px;">Submit</button>
        </div>
        <div class="panel" style="flex:1; border-color: #ef4444; border-style: dashed;">
            <h4 style="margin:0 0 5px 0;">🏦 Withdraw</h4>
            <input type="number" id="userWithAmt" placeholder="Amt" style="width:90%; margin-bottom:5px; font-size:11px;">
            <input type="text" id="userUPI" placeholder="UPI ID" style="width:90%; margin-bottom:5px; font-size:11px;">
            <button onclick="requestWithdrawal()" style="background:#ef4444; color:white; width:95%; padding: 5px; font-size:11px;">Withdraw</button>
        </div>
    </div>

    <div id="history" style="margin-top:20px; min-height: 35px;"></div>
</div>

<script>
    // === APNE FIREBASE CREDENTIALS YAHAN PASTE KAREIN ===
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        databaseURL: "YOUR_DATABASE_URL",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let myId = localStorage.getItem('ab_live_user_id');
    let myCoins = 0;
    let selectedSide = 'andar';
    let betPlacedThisRound = false;

    // Naye user ke aate hi unique database registration logic
    if (!myId) {
        myId = 'User_' + Math.floor(10000 + Math.random() * 90000);
        localStorage.setItem('ab_live_user_id', myId);
        database.ref('players/' + myId).set({ id: myId, coins: 500, currentBet: { side: 'none', amount: 0 } });
    }
    document.getElementById('myIdDisplay').innerText = myId;

    // Listen Realtime Player Status (Coins and current bets)
    database.ref('players/' + myId).on('value', snapshot => {
        let val = snapshot.val();
        if(val) {
            myCoins = val.coins;
            document.getElementById('coins').innerText = myCoins;
            if(val.currentBet && val.currentBet.amount > 0) {
                document.getElementById('totalBetDisplay').innerText = val.currentBet.amount;
                document.getElementById('betMsg').innerText = `Bet: ${val.currentBet.amount} on ${val.currentBet.side.toUpperCase()}`;
            } else {
                document.getElementById('totalBetDisplay').innerText = "0";
            }
        }
    });

    // Global App Configuration (UPI and History) Sync
    database.ref('system').on('value', snapshot => {
        let sys = snapshot.val();
        if(sys) {
            document.getElementById('displayUPI').innerText = "UPI: " + (sys.adminUPI || "loading...");
            if(sys.history) {
                let histArr = Object.values(sys.history);
                if (histArr.length > 15) histArr = histArr.slice(-15);
                document.getElementById('history').innerHTML = histArr.map(h => `<span class="${h === 'A' ? 'a-hist' : 'b-hist'}">${h}</span>`).join('');
            }
        }
    });

    // Core Game State Listener (No state is calculated on client to avoid refresh resets)
    database.ref('gameState').on('value', snapshot => {
        let game = snapshot.val();
        if(!game) return;

        document.getElementById('time').innerText = game.timeLeft;

        if (game.status === 'betting') {
            betPlacedThisRound = false;
            document.getElementById('placeBtn').disabled = false;
            document.getElementById('result').innerText = 'Wait...';
            document.getElementById('joker').innerHTML = '';
            document.getElementById('andar').innerHTML = '';
            document.getElementById('bahar').innerHTML = '';
            document.getElementById('andarBox').classList.remove('win');
            document.getElementById('baharBox').classList.remove('win');
            if(!betPlacedThisRound) document.getElementById('betMsg').innerText = '';
        } 
        else if (game.status === 'dealing') {
            document.getElementById('placeBtn').disabled = true;
            document.getElementById('result').innerText = 'Dealing Cards...';
            if(game.joker) buildJokerCard(game.joker);
            renderCurrentCards(game.andarCards, game.baharCards);
        } 
        else if (game.status === 'finished') {
            document.getElementById('placeBtn').disabled = true;
            document.getElementById('result').innerText = `${game.winner.toUpperCase()} WINS!`;
            document.getElementById('andarBox').classList.toggle('win', game.winner === 'andar');
            document.getElementById('baharBox').classList.toggle('win', game.winner === 'bahar');
        }
    });

    function buildJokerCard(joker) {
        let color = (joker.suit === '♥' || joker.suit === '♦') ? 'red' : 'black';
        document.getElementById('joker').innerHTML = `<div class="bigCard"><div class="${color}">${joker.rank}${joker.suit}</div><div style="font-size:40px; align-self:center; color:${color}">${joker.suit}</div><div class="${color}" style="text-align:right">${joker.rank}${joker.suit}</div></div>`;
    }

    function renderCurrentCards(andar, bahar) {
        if(andar) {
            document.getElementById('andar').innerHTML = Object.values(andar).map(c => {
                let color = (c.suit === '♥' || c.suit === '♦') ? 'red' : 'black';
                return `<div class="card"><span class="${color}">${c.rank}${c.suit}</span><span class="${color}" style="font-size:18px; text-align:center">${c.suit}</span></div>`;
            }).join('');
        }
        if(bahar) {
            document.getElementById('bahar').innerHTML = Object.values(bahar).map(c => {
                let color = (c.suit === '♥' || c.suit === '♦') ? 'red' : 'black';
                return `<div class="card"><span class="${color}">${c.rank}${c.suit}</span><span class="${color}" style="font-size:18px; text-align:center">${c.suit}</span></div>`;
            }).join('');
        }
    }

    function selectSide(side) {
        selectedSide = side;
        document.getElementById('andarBtn').className = (side === 'andar' ? 'btn-bet activeBtn' : 'btn-bet');
        document.getElementById('baharBtn').className = (side === 'bahar' ? 'btn-bet activeBtn' : 'btn-bet');
    }

    function placeBet() {
        if(betPlacedThisRound) return alert("Is round me bet lag chuki hai!");
        let amt = parseInt(document.getElementById('amount').value);
        if (amt <= 0 || isNaN(amt) || amt > myCoins) return alert("Invalid amount or balance!");

        betPlacedThisRound = true;
        database.ref('players/' + myId).update({
            coins: myCoins - amt,
            currentBet: { side: selectedSide, amount: amt }
        });
    }

    function requestDeposit() {
        let amt = document.getElementById('userDepAmt').value;
        let utr = document.getElementById('userUTR').value;
        if(!amt || utr.length < 5) return alert("Details bhariye!");
        database.ref('requests').push({ id: Date.now(), userId: myId, type: 'Deposit', amount: amt, info: utr, status: 'pending' });
        alert("Request sent!");
        document.getElementById('userDepAmt').value = ''; document.getElementById('userUTR').value = '';
    }

    function requestWithdrawal() {
        let amt = parseInt(document.getElementById('userWithAmt').value);
        let upi = document.getElementById('userUPI').value;
        if(!amt || upi.length < 5 || amt > myCoins) return alert("Low balance!");
        
        database.ref('players/' + myId).update({ coins: myCoins - amt });
        database.ref('requests').push({ id: Date.now(), userId: myId, type: 'Withdrawal', amount: amt, info: upi, status: 'pending' });
        alert("Withdrawal sent!");
        document.getElementById('userWithAmt').value = ''; document.getElementById('userUPI').value = '';
    }

    function quick(val) { document.getElementById('amount').value = (parseInt(document.getElementById('amount').value) || 0) + val; }
    function doubleBet() { document.getElementById('amount').value = (parseInt(document.getElementById('amount').value) || 0) * 2; }
    selectSide('andar');
</script>
</body>
</html>
