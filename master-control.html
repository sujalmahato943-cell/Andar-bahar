<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAPRAHTuiVTxDwng6KzCTDZ3-70P2YSN98",
        authDomain: "my-first-app-cad29.firebaseapp.com",
        databaseURL: "https://my-first-app-cad29-default-rtdb.firebaseio.com",
        projectId: "my-first-app-cad29",
        storageBucket: "my-first-app-cad29.appspot.com",
        messagingSenderId: "899016030652",
        appId: "1:899016030652:web:b7d3c0b1294b2db6f453b9",
        measurementId: "G-7M1JKFC5R3"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    let myId = localStorage.getItem('player_id') || 'Player_' + Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem('player_id', myId);
    let myCoins = 5000; 
    let selectedSide = 'andar';
    let betPlacedThisRound = false;

    const idDisplay = document.getElementById('displayId') || document.querySelector('[id*="ID"]') || document.body;
    if (idDisplay) {
        if(idDisplay.innerHTML.includes("Loading ID...")) {
            idDisplay.innerHTML = idDisplay.innerHTML.replace("Loading ID...", myId);
        } else {
            idDisplay.innerText = "My Account ID: " + myId;
        }
    }

    onValue(ref(database, 'game'), (snapshot) => {
        const game = snapshot.val();
        if (!game) return;

        let timeText = game.time !== undefined ? game.time + "s" : "0s";
        const timeEl = document.getElementById('time') || document.querySelector('[id*="time"]');
        if(timeEl) timeEl.innerText = timeText;

        if (game.status === 'betting') {
            betPlacedThisRound = false;
            if(document.getElementById('placeBtn')) document.getElementById('placeBtn').disabled = false;
            if(document.getElementById('result')) document.getElementById('result').innerText = 'Wait...';
            if(document.getElementById('joker')) document.getElementById('joker').innerHTML = '';
            if(document.getElementById('andar')) document.getElementById('andar').innerHTML = '';
            if(document.getElementById('bahar')) document.getElementById('bahar').innerHTML = '';
            if(document.getElementById('andarBox')) document.getElementById('andarBox').classList.remove('win');
            if(document.getElementById('baharBox')) document.getElementById('baharBox').classList.remove('win');
        } 
        else if (game.status === 'dealing') {
            if(document.getElementById('placeBtn')) document.getElementById('placeBtn').disabled = true;
            if(document.getElementById('result')) document.getElementById('result').innerText = 'Dealing Cards...';
            if(game.joker) buildJokerCard(game.joker);
            renderCurrentCards(game.andarCards, game.baharCards);
        } 
        else if (game.status === 'finished') {
            if(document.getElementById('placeBtn')) document.getElementById('placeBtn').disabled = true;
            if(document.getElementById('result')) document.getElementById('result').innerText = `${game.winner.toUpperCase()} WINS!`;
            if(document.getElementById('andarBox')) document.getElementById('andarBox').classList.toggle('win', game.winner === 'andar');
            if(document.getElementById('baharBox')) document.getElementById('baharBox').classList.toggle('win', game.winner === 'bahar');
        }
    });

    function buildJokerCard(joker) {
        let color = (joker.suit === '♥' || joker.suit === '♦') ? 'red' : 'black';
        if(document.getElementById('joker')) {
            document.getElementById('joker').innerHTML = `<div class="bigCard"><div class="${color}">${joker.rank}${joker.suit}</div><div style="font-size:40px; align-self:center; color:${color}">${joker.suit}</div><div class="${color}" style="text-align:right">${joker.rank}${joker.suit}</div></div>`;
        }
    }

    function renderCurrentCards(andar, bahar) {
        if(andar && document.getElementById('andar')) {
            document.getElementById('andar').innerHTML = Object.values(andar).map(c => {
                let color = (c.suit === '♥' || c.suit === '♦') ? 'red' : 'black';
                return `<div class="card"><span class="${color}">${c.rank}${c.suit}</span><span class="${color}" style="font-size:18px; text-align:center">${c.suit}</span></div>`;
            }).join('');
        }
        if(bahar && document.getElementById('bahar')) {
            document.getElementById('bahar').innerHTML = Object.values(bahar).map(c => {
                let color = (c.suit === '♥' || c.suit === '♦') ? 'red' : 'black';
                return `<div class="card"><span class="${color}">${c.rank}${c.suit}</span><span class="${color}" style="font-size:18px; text-align:center">${c.suit}</span></div>`;
            }).join('');
        }
    }

    window.selectSide = function(side) {
        selectedSide = side;
        if(document.getElementById('andarBtn')) document.getElementById('andarBtn').className = (side === 'andar' ? 'btn-bet activeBtn' : 'btn-bet');
        if(document.getElementById('baharBtn')) document.getElementById('baharBtn').className = (side === 'bahar' ? 'btn-bet activeBtn' : 'btn-bet');
    }

    window.placeBet = function() {
        if(betPlacedThisRound) return alert("Is round me bet lag chuki hai!");
        let amt = parseInt(document.getElementById('amount').value);
        if (amt <= 0 || isNaN(amt) || amt > myCoins) return alert("Invalid amount or balance!");

        betPlacedThisRound = true;
        update(ref(database, 'players/' + myId), {
            coins: myCoins - amt,
            currentBet: { side: selectedSide, amount: amt }
        });
        alert("Bet Placed!");
    }

    window.requestDeposit = function() {
        let amt = document.getElementById('userDepAmt').value;
        let utr = document.getElementById('userUTR').value;
        if(!amt || utr.length < 5) return alert("Details bhariye!");
        push(ref(database, 'requests'), { id: Date.now(), userId: myId, type: 'Deposit', amount: amt, info: utr, status: 'pending' });
        alert("Request sent!");
        document.getElementById('userDepAmt').value = ''; document.getElementById('userUTR').value = '';
    }

    window.requestWithdrawal = function() {
        let amt = parseInt(document.getElementById('userWithAmt').value);
        let upi = document.getElementById('userUPI').value;
        if(!amt || upi.length < 5 || amt > myCoins) return alert("Low balance!");
        
        update(ref(database, 'players/' + myId), { coins: myCoins - amt });
        push(ref(database, 'requests'), { id: Date.now(), userId: myId, type: 'Withdrawal', amount: amt, info: upi, status: 'pending' });
        alert("Withdrawal sent!");
        document.getElementById('userWithAmt').value = ''; document.getElementById('userUPI').value = '';
    }

    window.quick = function(val) { document.getElementById('amount').value = (parseInt(document.getElementById('amount').value) || 0) + val; }
    window.doubleBet = function() { document.getElementById('amount').value = (parseInt(document.getElementById('amount').value) || 0) * 2; }
    
    window.selectSide('andar');
        </script>
