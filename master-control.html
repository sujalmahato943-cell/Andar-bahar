<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control Panel - Andar Bahar</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .admin-container {
            max-width: 600px;
            margin: 0 auto;
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }
        h2, h3 {
            text-align: center;
            color: #38bdf8;
            margin-top: 0;
        }
        .section-box {
            background: #0f172a;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #1e293b;
        }
        label {
            display: block;
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 5px;
            text-align: left;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            box-sizing: border-box;
            margin-bottom: 12px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-blue { background: #0284c7; color: white; }
        .btn-blue:hover { background: #0369a1; }
        .btn-green { background: #16a34a; color: white; }
        .btn-green:hover { background: #15803d; }
        
        .result-display {
            background: #1e293b;
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
            border-left: 4px solid #38bdf8;
            display: none;
            text-align: left;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 15px;
        }
        .highlight { color: #4ade80; font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>🛠️ MASTER CONTROL PANEL</h2>
    <p style="text-align:center; color:#64748b; font-size:13px; margin-top:-10px;">Game Engine & Player Manager</p>

    <!-- 🔥 NEW MODULE: PLAYER ID SEARCH & COIN MANAGEMENT -->
    <div class="section-box">
        <h3>👤 Player Management</h3>
        
        <!-- Step 1: Search Player -->
        <label for="searchPlayerId">Enter Player Unique ID:</label>
        <input type="text" id="searchPlayerId" placeholder="e.g., PLAYER-12345">
        <button class="btn btn-blue" onclick="searchPlayer()">🔍 CHECK PLAYER DETAILS</button>

        <!-- Live Details Result Box -->
        <div id="searchResultBox" class="result-display">
            <div class="info-row">
                <span>Player ID:</span>
                <span id="resId" style="color:#38bdf8; font-weight:bold;">--</span>
            </div>
            <div class="info-row">
                <span>Current Coins:</span>
                <span id="resCoins" class="highlight">--</span>
            </div>
            <div class="info-row">
                <span>Active Bet Side:</span>
                <span id="resBetSide" style="color:#f59e0b;">--</span>
            </div>
            <div class="info-row">
                <span>Active Bet Amount:</span>
                <span id="resBetAmt" style="color:#f59e0b;">--</span>
            </div>
            
            <hr style="border:0; border-top:1px solid #334155; margin:12px 0;">
            
            <!-- Step 2: Add Coins to this searched Player -->
            <label for="modCoinAmt">Add / Remove Coins (Use minus sign '-' to remove):</label>
            <input type="number" id="modCoinAmt" placeholder="e.g., 500 or -200">
            <button class="btn btn-green" onclick="updatePlayerCoins()">💰 UPDATE COINS BALANCE</button>
        </div>
    </div>

    <!-- Note: Apne purane system configurations (Timer, Joker controls) ko aap iske niche jod sakte hain -->
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getDatabase, ref, get, update, increment } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

    // Same configuration linked with your DB
    const firebaseConfig = { databaseURL: "https://my-first-app-cad29-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    let activeSearchedId = null; // Track karne ke liye ki kis player par management chal raha hai

    // 1. UNIQUE ID SE SEARCH KARNE KA LOGIC
    window.searchPlayer = function() {
        const pIdInput = document.getElementById('searchPlayerId').value.trim();
        if(!pIdInput) return alert("Please enter a valid Player ID!");

        const playerRef = ref(database, 'players/' + pIdInput);

        get(playerRef).then((snapshot) => {
            if(snapshot.exists()) {
                const pData = snapshot.val();
                activeSearchedId = pIdInput; // lock active target

                // Data mapping to admin UI elements
                document.getElementById('resId').innerText = pIdInput;
                document.getElementById('resCoins').innerText = pData.coins !== undefined ? pData.coins + " Coins" : "0 Coins";
                
                if(pData.currentBet) {
                    document.getElementById('resBetSide').innerText = (pData.currentBet.side).toUpperCase();
                    document.getElementById('resBetAmt').innerText = pData.currentBet.amount + " Coins";
                } else {
                    document.getElementById('resBetSide').innerText = "No Active Bet";
                    document.getElementById('resBetAmt').innerText = "0 Coins";
                }

                // Show the visual section layout
                document.getElementById('searchResultBox').style.display = 'block';
            } else {
                document.getElementById('searchResultBox').style.display = 'none';
                activeSearchedId = null;
                alert("Player ID not found in Database!");
            }
        }).catch((err) => {
            console.error(err);
            alert("Database tracking failed.");
        });
    }

    // 2. COINS ADD / REMOVE KARNE KA LOGIC (Using Atomic Increment Sync)
    window.updatePlayerCoins = function() {
        if(!activeSearchedId) return alert("No active player selected to update!");
        
        let coinModInput = parseInt(document.getElementById('modCoinAmt').value);
        if(isNaN(coinModInput) || coinModInput === 0) return alert("Please enter a valid coin value!");

        const targetPlayerRef = ref(database, 'players/' + activeSearchedId);

        // Firebase atomic operation se direct existing coin value me add (+) ya minus (-) karega
        update(targetPlayerRef, {
            coins: increment(coinModInput)
        }).then(() => {
            alert(`Successfully updated coins for ${activeSearchedId}!`);
            document.getElementById('modCoinAmt').value = ''; // clean input field
            searchPlayer(); // refresh data metrics on view box
        }).catch((err) => {
            alert("Failed to modify coins balance.");
        });
    }
</script>
</body>
</html>
