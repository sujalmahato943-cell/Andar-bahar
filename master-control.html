<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control Admin Panel</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { max-width: 500px; margin: 0 auto; background: #1e293b; padding: 20px; border-radius: 15px; border: 1px solid #334155; }
        button { padding: 12px 24px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; margin: 8px; font-size: 14px; text-transform: uppercase; }
        .btn-auto { background: #64748b; color: white; }
        .btn-andar { background: #2563eb; color: white; }
        .btn-bahar { background: #d97706; color: white; }
        .status-box { background: #020617; padding: 10px; border-radius: 8px; margin: 15px 0; font-size: 15px; color: #38bdf8; }
    </style>
</head>
<body>

<div class="box">
    <h2>🎛️ SYSTEM CONTROLLER PANEL</h2>
    <p style="color: #94a3b8;">Set Next Winner Command Forcefully</p>
    
    <div class="status-box">
        Current Mode/Target: <strong id="currTarget">LOADING...</strong>
    </div>

    <div>
        <button class="btn-andar" onclick="setForce('andar')">FORCE ANDAR WINS</button>
        <button class="btn-bahar" onclick="setForce('bahar')">FORCE BAHAR WINS</button>
        <br>
        <button class="btn-auto" onclick="setForce('auto')" style="width: 94%;">RESET TO AUTOMATIC MODE</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.x.x/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.x.x/firebase-database.js";

    // Direct Bypass Synced Config matching index.html
    const firebaseConfig = {
        databaseURL: "https://andar-bahar-b7443-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    onValue(ref(database, "game/forcedWinner"), (snapshot) => {
        let val = snapshot.exists() ? snapshot.val().toUpperCase() : "AUTO";
        document.getElementById("currTarget").innerText = val;
    });

    window.setForce = function(mode) {
        set(ref(database, "game/forcedWinner"), mode);
        alert("Command Sent: Target updated to " + mode.toUpperCase());
    }
</script>
</body>
</html>
