<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control Panel</title>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card-box { background: #1e293b; padding: 20px; border-radius: 10px; max-width: 400px; margin: 20px auto; border: 2px solid #3b82f6; }
        .btn { background-color: #3b82f6; color: white; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; margin: 10px; width: 80%; }
        .btn:hover { background-color: #2563eb; }
        .status-text { font-size: 20px; color: #38bdf8; font-weight: bold; margin: 10px 0; }
        .badge { background: #10b981; padding: 5px 10px; border-radius: 5px; font-size: 14px; }
    </style>
</head>
<body>

    <h1>🔮 MASTER CONTROL PANEL</h1>
    <p>Termux Server Status: <span class="badge">ONLINE & RUNNING</span></p>

    <div class="card-box">
        <h3>Live Game Monitoring</h3>
        <div class="status-text">Status: <span id="liveStatus">Loading...</span></div>
        <div class="status-text">Time Left: <span id="liveTime">0s</span></div>
    </div>

    <div class="card-box">
        <h3>Game Controller (Hack Mode)</h3>
        <p style="color: #94a3b8; font-size: 14px;">Aap yahan se agla round fix kar sakte hain:</p>
        <button class="btn" onclick="setWinner('andar')">Force Win: ANDAR 🔴</button>
        <button class="btn" onclick="setWinner('bahar')">Force Win: BAHAR 🔵</button>
        <button class="btn" style="background-color: #64748b;" onclick="setWinner('auto')">Reset to Automatic (Normal Mode)</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Aapka Asli Firebase Credentials
        const firebaseConfig = {
            apiKey: "AIzaSyAPRAHTuiVTxDwng6KzCTDZ3-70P2YSN98",
            authDomain: "my-first-app-cad29.firebaseapp.com",
            databaseURL: "https://my-first-app-cad29-default-rtdb.firebaseio.com",
            projectId: "my-first-app-cad29",
            storageBucket: "my-first-app-cad29.appspot.com",
            messagingSenderId: "899016030652",
            appId: "1:899016030652:web:b7d3c0b1294b2db6f453b9"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // Live Termux Data Monitor karna Admin screen par
        onValue(ref(database, 'game'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('liveStatus').innerText = data.status.toUpperCase();
                document.getElementById('liveTime').innerText = data.time + "s";
            }
        });

        // Winning Fix karne ka function
        window.setWinner = function(side) {
            update(ref(database, 'game'), { forcedWinner: side });
            alert("Setting Save! Next Winner Target: " + side.toUpperCase());
        };
    </script>
</body>
</html>
